function normName(n){ return n.toLowerCase().replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim(); }
function fuzzy(a,b){
  const na=normName(a),nb=normName(b);
  if(na===nb) return 1;
  const pa=na.split(" "),pb=nb.split(" ");
  let m=0;
  for(const x of pa) for(const y of pb) if(x===y&&x.length>2) m++;
  return m/Math.max(pa.length,pb.length);
}
function checkDNH(name,list){
  for(const d of list){
    const sc=fuzzy(name,d.name);
    if(sc>=0.99) return{type:"exact",entry:d};
    if(sc>=0.6) return{type:"fuzzy",entry:d};
  }
  return null;
}

  // Parse a group key to a sortable timestamp (newer = larger)
  function groupSortKey(key){
    // Extract the class/group portion after " — "
    const part = key.split(" — ")[1] || "";
    // MM/DD/YYYY  e.g. "04/27/2026"
    const full = part.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(full) return new Date(`${full[3]}-${full[1]}-${full[2]}`).getTime();
    // MM/YYYY  e.g. "10/2025"
    const mo = part.match(/^(\d{2})\/(\d{4})$/);
    if(mo) return new Date(`${mo[2]}-${mo[1]}-01`).getTime();
    // Month name + year  e.g. "May 2026"
    const named = part.match(/^([A-Za-z]+)\s+(\d{4})$/);
    if(named){ const d=new Date(`${named[1]} 1, ${named[2]}`); if(!isNaN(d)) return d.getTime(); }
    // Pipeline / Manager Pipeline / Negotiations Pipeline — sort to bottom
    return 0;
  }

  const sortedGroupKeys = useMemo(()=>
    Object.keys(grouped).sort((a,b)=>groupSortKey(b)-groupSortKey(a))
  ,[grouped]);

    const src=fDept==="All"?cands:cands.filter(c=>c.dept===fDept);

    const active=src.filter(c=>["Pipeline","Evaluating"].includes(c.status)).length;

    return{total,hired,active,flagged,byDept};

  const rpt=useMemo(()=>{
    const src=fDept==="All"?cands:cands.filter(c=>c.dept===fDept);
    const byStatus={},bySource={},referrals={};
    for(const c of src){
      byStatus[c.status]=(byStatus[c.status]||0)+1;
      if(c.source) bySource[c.source]=(bySource[c.source]||0)+1;
      if(c.referredBy&&c.referredBy.trim()){
        const refs=c.referredBy.split(",").map(r=>r.trim()).filter(r=>r&&r.length>2&&!/outreach|email|applied|background|initiated|contact|strategic/i.test(r));
        for(const r of refs) referrals[r]=(referrals[r]||0)+1;

  },[cands,fDept]);

  async function handleResumeDrop(e){
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer?.files?.[0] || e.target?.files?.[0];
    if(!file) return;
    const allowed = ["application/pdf","application/msword","application/vnd.openxmlformats-officedocument.wordprocessingml.document","text/plain"];
    if(!allowed.includes(file.type) && !file.name.match(/\.(pdf|doc|docx|txt)$/i)){
      alert("Please drop a PDF, Word document, or text file.");
      return;
    }
    setResumeFileName(file.name);
    setResumeParsing(true);
    setResumeModal(true);
    // Reset form
    setNC({name:"",status:"Pipeline",interviewStage:"",startDate:"",source:"",referredBy:"",dept:"Sales",role:"Sales Rep",hiringClass:"",screeningStatus:"",notes:""});
    setDnhW(null); setDupW(null);
    try{
      const base64 = await new Promise((res,rej)=>{
        const reader = new FileReader();
        reader.onload = ()=> res(reader.result.split(",")[1]);
        reader.onerror = ()=> rej(new Error("File read failed"));
        reader.readAsDataURL(file);
      });
      const isPDF = file.type==="application/pdf" || file.name.toLowerCase().endsWith(".pdf");
      const messages = isPDF
        ? [{role:"user",content:[
            {type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},
            {type:"text",text:`Extract candidate info from this resume. Respond ONLY with a JSON object (no markdown, no backticks) with these exact keys: name, email, phone, currentTitle, currentCompany, yearsExperience, skills, education, notes. For notes, write 2-3 sentences summarizing experience and suitability for a debt settlement sales or negotiations role. If a field is unknown, use an empty string.`}
          ]}]
        : [{role:"user",content:`Extract candidate info from this resume text. Respond ONLY with a JSON object (no markdown, no backticks) with these exact keys: name, email, phone, currentTitle, currentCompany, yearsExperience, skills, education, notes. For notes, write 2-3 sentences summarizing experience and suitability for a debt settlement sales or negotiations role. If a field is unknown, use an empty string.\n\nResume:\n${atob(base64)}`}];
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages})
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || "{}";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      const candidate = {
        name: parsed.name || "",
        status: "Resume Received",
        startDate: "",
        source: "Resume",
        referredBy: "",
        dept: "Sales",
        role: "Sales Rep",
        hiringClass: "",
        screeningStatus: "",
        notes: [
          parsed.notes,
          parsed.currentTitle ? `Current: ${parsed.currentTitle}${parsed.currentCompany ? ` at ${parsed.currentCompany}` : ""}` : "",
          parsed.yearsExperience ? `Experience: ${parsed.yearsExperience} years` : "",
          parsed.skills ? `Skills: ${parsed.skills}` : "",
          parsed.education ? `Education: ${parsed.education}` : "",
          parsed.email ? `Email: ${parsed.email}` : "",
          parsed.phone ? `Phone: ${parsed.phone}` : "",
        ].filter(Boolean).join(" | "),
        shortList: false,
        rehirable: true,
      };
      setNC(candidate);
      if(candidate.name.length>=3){
        setDnhW(checkDNH(candidate.name,dnh));
        const dup=cands.find(c=>fuzzy(c.name,candidate.name)>=0.8);
        setDupW(dup||null);
      }
    }catch(err){
      console.error(err);
      setNC(p=>({...p,notes:"Resume uploaded — please fill in details manually."}));

      }
    }

      // Auto-clear screening when hired
      if(f==="status"&&v==="Hired") updated.screeningStatus="";
      return updated;
    }));
    if(sel?.id===id) setSel(p=>({...p,[f]:v,...(f==="status"&&v==="Hired"?{screeningStatus:""}:{})}));
  }

  function confirmStatusChange(){
    if(!statusPrompt) return;
    const {id, newStatus, date, note} = statusPrompt;
    const isoDate = date ? new Date(date).toISOString() : new Date().toISOString();
    const entry = {status: newStatus, date: isoDate, note: note.trim()};
    setCands(p=>p.map(c=>{
      if(c.id!==id) return c;
      return {...c, status: newStatus, screeningStatus: newStatus==="Hired"?"":c.screeningStatus, history: [...(c.history||[]), entry]};
    }));
    if(sel?.id===id){
      setSel(p=>({...p, status: newStatus, history: [...(p.history||[]), entry]}));
    }
    setStatusPrompt(null);
  }

    if(!bulkPrompt) return;
    const {newStatus, date, note} = bulkPrompt;
    const isoDate = date ? new Date(date).toISOString() : new Date().toISOString();
    const entry = {status: newStatus, date: isoDate, note: note.trim()};
    setCands(p=>p.map(c=>{
      if(!selectedIds.has(c.id)) return c;
      if(c.status===newStatus) return c;
      return {...c, status: newStatus, screeningStatus: newStatus==="Hired"?"":c.screeningStatus, history: [...(c.history||[]), entry]};
    }));
    setSelectedIds(new Set());
    setBulkPrompt(null);
  }

    e.stopPropagation();
    setSelectedIds(prev=>{
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });

    setSelectedIds(prev=>{
      const next = new Set(prev);
      if(allSelected){ groupIds.forEach(id=>next.delete(id)); }

    });

          <div style={{fontSize:48,marginBottom:12}}>📄</div>
          <div style={{fontSize:20,fontWeight:700,color:"#1e40af"}}>Drop resume to create candidate</div>
          <div style={{fontSize:14,color:"#3b82f6",marginTop:6}}>PDF, Word, or text files supported</div>
        </div>
      )}
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      {/* HEADER */}
      <div style={{background:"#0f172a",color:"#fff",padding:"0 24px"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:24,height:24,background:"#3b82f6",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>👥</div>

          }).sort((a,b)=>{
            const aLast=a.history&&a.history[a.history.length-1]?.date?new Date(a.history[a.history.length-1].date):new Date(0);

          {/* NEW CANDIDATES OVER TIME */}
          {(()=>{
            const now=new Date();
            let fromDate=null, toDate=new Date(now);
            toDate.setHours(23,59,59,999);

            if(rptRange==="custom"){
              fromDate=rptFrom?new Date(rptFrom):null;
              toDate=rptTo?new Date(rptTo+"T23:59:59"):toDate;
            } else {
              fromDate=new Date(now);
              fromDate.setDate(fromDate.getDate()-parseInt(rptRange));
              fromDate.setHours(0,0,0,0);
            }

            const src=fDept==="All"?cands:cands.filter(c=>c.dept===fDept);

            const inRange=src.filter(c=>{
              const h=c.history&&c.history[0];
              if(!h||!h.date) return false;
              const d=new Date(h.date);
              if(isNaN(d)) return false;
              if(fromDate&&d<fromDate) return false;
              if(toDate&&d>toDate) return false;
              return true;
            });

            const byDay={};
            inRange.forEach(c=>{
              const d=new Date(c.history[0].date);
              const key=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
              byDay[key]=(byDay[key]||0)+1;
            });

            const byStatus={};
            inRange.forEach(c=>{ byStatus[c.status]=(byStatus[c.status]||0)+1; });
            const byDeptR={};
            inRange.forEach(c=>{ byDeptR[c.dept]=(byDeptR[c.dept]||0)+1; });
            const bySrc={};
            inRange.forEach(c=>{ if(c.source) bySrc[c.source]=(bySrc[c.source]||0)+1; });

            const maxDay=Math.max(1,...Object.values(byDay));
            const days=Object.entries(byDay);
            const presets=[["7","7 days"],["14","14 days"],["30","30 days"],["60","60 days"],["90","90 days"],["365","1 year"],["custom","Custom"]];

            return(
              <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:20,marginBottom:14}}>

                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#111"}}>New Candidates Added</div>
                    <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>
                      {fromDate?fromDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"All time"} - {toDate.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    {presets.map(([val,label])=>(
                      <button key={val} onClick={()=>setRptRange(val)}

                        {label}
                      </button>
                    ))}
                  </div>
                </div>

                {rptRange==="custom"&&(
                  <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
                    <label style={{fontSize:12,color:"#6b7280"}}>From:</label>
                    <input type="date" value={rptFrom} onChange={e=>setRptFrom(e.target.value)} style={{border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 9px",fontSize:13,outline:"none"}}/>
                    <label style={{fontSize:12,color:"#6b7280"}}>To:</label>
                    <input type="date" value={rptTo} onChange={e=>setRptTo(e.target.value)} style={{border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 9px",fontSize:13,outline:"none"}}/>
                  </div>
                )}

                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                  {[
                    {label:"New Candidates",value:inRange.length,color:"#3b82f6"},
                    {label:"Hired",value:inRange.filter(c=>c.status==="Hired").length,color:"#10b981"},
                    {label:"Active",value:inRange.filter(c=>["Pipeline","Evaluating"].includes(c.status)).length,color:"#f59e0b"},
                    {label:"Rejected / DNH",value:inRange.filter(c=>["Rejected","Do Not Hire"].includes(c.status)).length,color:"#ef4444"},
                  ].map(s=>(
                    <div key={s.label} style={{background:"#f8fafc",borderRadius:8,padding:"12px 14px",textAlign:"center"}}>
                      <div style={{fontSize:28,fontWeight:700,color:s.color}}>{s.value}</div>
                      <div style={{fontSize:11,color:"#6b7280",marginTop:2,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.label}</div>
                    </div>
                  ))}
                </div>

                {days.length>0&&(
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:10}}>Added per day</div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,overflowX:"auto",paddingBottom:20}}>
                      {days.map(([day,count])=>(
                        <div key={day} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:32,flex:"0 0 auto"}}>
                          <span style={{fontSize:9,color:"#9ca3af",fontWeight:600}}>{count}</span>
                          <div style={{width:28,background:"#3b82f6",borderRadius:"3px 3px 0 0",height:`${Math.round((count/maxDay)*55)+4}px`}}/>
                          <span style={{fontSize:9,color:"#9ca3af",whiteSpace:"nowrap"}}>{day}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:16}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>By Status</div>
                    {Object.entries(byStatus).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <SBadge status={k}/>
                        <span style={{fontSize:12,fontWeight:600,color:"#111"}}>{v}</span>
                      </div>
                    ))}
                    {!Object.keys(byStatus).length&&<div style={{fontSize:12,color:"#9ca3af"}}>No data for this period</div>}
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>By Department</div>
                    {Object.entries(byDeptR).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5,padding:"3px 0",borderBottom:"1px solid #f3f4f6"}}>
                        <span style={{color:"#374151"}}>{k}</span>
                        <span style={{fontWeight:600,color:"#111"}}>{v}</span>
                      </div>
                    ))}
                    {!Object.keys(byDeptR).length&&<div style={{fontSize:12,color:"#9ca3af"}}>No data for this period</div>}
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>By Source</div>
                    {Object.entries(bySrc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5,padding:"3px 0",borderBottom:"1px solid #f3f4f6"}}>
                        <span style={{color:"#374151"}}>{k}</span>
                        <span style={{fontWeight:600,color:"#111"}}>{v}</span>
                      </div>
                    ))}
                    {!Object.keys(bySrc).length&&<div style={{fontSize:12,color:"#9ca3af"}}>No data for this period</div>}
                  </div>
                </div>

                {inRange.length>0&&(
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>All candidates in this period ({inRange.length})</div>
                    <div style={{border:"1px solid #e5e7eb",borderRadius:7,overflow:"hidden"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead><tr style={{background:"#f8fafc"}}>
                          {["Name","Dept","Status","Source","Date Added"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                          {[...inRange].sort((a,b)=>new Date(b.history[0].date)-new Date(a.history[0].date)).map((c,i)=>{
                            const d=new Date(c.history[0].date);
                            return(
                              <tr key={c.id} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa",cursor:"pointer"}} onClick={()=>{setSel(c);setTab("pipeline");}}>
                                <td style={{padding:"6px 10px",fontWeight:600}}>{c.name}</td>
                                <td style={{padding:"6px 10px",color:"#6b7280"}}>{c.dept}</td>
                                <td style={{padding:"6px 10px"}}><SBadge status={c.status}/></td>
                                <td style={{padding:"6px 10px",color:"#6b7280"}}>{c.source||"—"}</td>
                                <td style={{padding:"6px 10px",color:"#6b7280"}}>{isNaN(d)?"—":d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:16}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Candidates by status</div>
              {Object.entries(rpt.byStatus).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k,v])=><Bar key={k} label={k} value={v} max={Math.max(...Object.values(rpt.byStatus))} color={STATUS_STYLE[k]?.border||"#93c5fd"}/>)}
            </div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:16}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Candidates by source</div>
              {Object.entries(rpt.bySource).sort((a,b)=>b[1]-a[1]).map(([k,v])=><Bar key={k} label={k} value={v} max={Math.max(...Object.values(rpt.bySource))} color="#3b82f6"/>)}
            </div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:16}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>By department</div>
              {Object.entries(stats.byDept).map(([k,v])=><Bar key={k} label={k} value={v} max={Math.max(...Object.values(stats.byDept))} color="#10b981"/>)}
            </div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:16}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Top referrers</div>
              {Object.entries(rpt.referrals).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k,v],i)=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontSize:11,color:"#9ca3af",width:16,textAlign:"right"}}>#{i+1}</span>
                  <span style={{flex:1,fontSize:13}}>{k}</span>
                  <span style={{fontSize:11,fontWeight:600,background:"#dbeafe",color:"#1e40af",padding:"2px 8px",borderRadius:99}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </>)}

        {/* ── AI TAB ── */}
        {tab==="ai"&&(
          <div style={{maxWidth:680}}>
            <h2 style={{margin:"0 0 4px",fontSize:16,fontWeight:700}}>AI Hiring Assistant</h2>
            <p style={{margin:"0 0 14px",fontSize:13,color:"#6b7280"}}>Ask anything about your {cands.length} candidates across all departments.</p>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
              {["Who is on the short list?","Pending screenings?","No Hires?","Referrals from Dan Harrington","Possible duplicates?"].map(q=>(
                <button key={q} onClick={()=>setAiQ(q)} style={{fontSize:12,padding:"4px 9px",background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:99,cursor:"pointer",color:"#334155"}}>{q}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:7}}>
              <input value={aiQ} onChange={e=>setAiQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&askAI()} placeholder="Ask anything…" style={{flex:1,border:"1px solid #e5e7eb",borderRadius:7,padding:"8px 12px",fontSize:14,outline:"none"}}/>
              <button onClick={askAI} disabled={aiLoad} style={{background:"#0f172a",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:aiLoad?"wait":"pointer",opacity:aiLoad?0.7:1}}>{aiLoad?"…":"Ask"}</button>
            </div>
            {aiRes&&<div style={{marginTop:12,background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:16,fontSize:14,lineHeight:1.7,color:"#374151",whiteSpace:"pre-wrap"}}>{aiRes}</div>}
          </div>
        )}
      </div>

      {/* RESUME REVIEW MODAL */}
      {resumeModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{if(!resumeParsing){setResumeModal(false);}}}>
          <div style={{background:"#fff",borderRadius:12,padding:20,width:540,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:36,height:36,background:"#f0fdf4",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📄</div>
              <div>
                <h3 style={{margin:0,fontSize:15,fontWeight:700}}>Resume: {resumeFileName}</h3>
                <p style={{margin:0,fontSize:12,color:"#6b7280"}}>{resumeParsing?"AI is reading the resume...":"Review extracted details and save"}</p>
              </div>
            </div>

            {resumeParsing?(
              <div style={{textAlign:"center",padding:"32px 0"}}>
                <div style={{fontSize:36,marginBottom:12}}>{"⏳"}</div>
                <div style={{fontSize:14,color:"#6b7280"}}>Parsing resume with AI...</div>
                
              </div>
            ):(
              <>
                {dnhW&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:7,padding:"8px 12px",marginBottom:9,fontSize:13,color:"#991b1b"}}><strong>⛔ {dnhW.type==="exact"?"DO NOT HIRE":"Possible DNH match"}</strong>: {dnhW.entry.name} — {dnhW.entry.reason}</div>}
                {dupW&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:7,padding:"8px 12px",marginBottom:9,fontSize:13,color:"#92400e"}}><strong>⚠ Possible duplicate</strong>: "{dupW.name}" already exists ({dupW.status}).</div>}
                <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:7,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#166534"}}>
                  ✅ AI extracted the details below. Review and adjust before saving.
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Full Name *</label>
                    <input value={nC.name} onChange={e=>onNameChange(e.target.value)} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,boxSizing:"border-box"}}/>
                  </div>
                  {[
                    {label:"Department",field:"dept",type:"sel",opts:["Sales","Negotiations","Client Services"]},
                    {label:"Role",field:"role",type:"txt"},
                    {label:"Status",field:"status",type:"sel",opts:STATUSES},
                    {label:"Interview Stage",field:"interviewStage",type:"sel",opts:INTERVIEW_STAGES},
                    {label:"Source",field:"source",type:"sel",opts:["Resume","Direct Email","Referral","PDRCareer","LinkedIn","Outreach","BruntWork","Other"]},
                    {label:"Hiring Class",field:"hiringClass",type:"txt"},
                    {label:"Screening Status",field:"screeningStatus",type:"sel",opts:SCREENING_STATUSES},
                    {label:"Referred By",field:"referredBy",type:"txt"},
                    {label:"Start Date",field:"startDate",type:"date"},
                  ].map(({label,field,type,opts})=>(
                    <div key={field}>
                      <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>{label}</label>
                      {type==="sel"?(
                        <select value={nC[field]} onChange={e=>setNC(p=>({...p,[field]:e.target.value}))} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13}}>
                          {opts.map(o=><option key={o}>{o}</option>)}
                        </select>
                      ):(
                        <input type={type==="date"?"date":"text"} value={nC[field]} onChange={e=>setNC(p=>({...p,[field]:e.target.value}))} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,boxSizing:"border-box"}}/>
                      )}
                    </div>
                  ))}
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Notes (AI summary + extracted details)</label>
                    <textarea value={nC.notes} onChange={e=>setNC(p=>({...p,notes:e.target.value}))} rows={4} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
                  </div>
    
                </div>
                <div style={{display:"flex",gap:7,marginTop:16,justifyContent:"flex-end"}}>
                  <button onClick={()=>setResumeModal(false)} style={{border:"1px solid #e5e7eb",background:"#fff",borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>Cancel</button>
                  <button onClick={()=>addCand(true)} disabled={!nC.name.trim()} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:nC.name.trim()?"pointer":"not-allowed",opacity:nC.name.trim()?1:0.5}}>Save Candidate</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* ADD CANDIDATE MODAL */}
      {showAdd&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowAdd(false)}>
          <div style={{background:"#fff",borderRadius:12,padding:20,width:510,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:700}}>Add New Candidate</h3>
            {dnhW&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:7,padding:"8px 12px",marginBottom:9,fontSize:13,color:"#991b1b"}}><strong>⛔ {dnhW.type==="exact"?"DO NOT HIRE":"Possible DNH match"}</strong>: {dnhW.entry.name} — {dnhW.entry.reason}</div>}
            {dupW&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:7,padding:"8px 12px",marginBottom:9,fontSize:13,color:"#92400e"}}><strong>⚠ Possible duplicate</strong>: "{dupW.name}" already exists ({dupW.status}).</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Full Name *</label>
                <input value={nC.name} onChange={e=>onNameChange(e.target.value)} placeholder="First Last" style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,boxSizing:"border-box"}}/>
              </div>
              {[
                {label:"Department",field:"dept",type:"sel",opts:["Sales","Negotiations","Client Services"]},
                {label:"Role",field:"role",type:"txt"},
                {label:"Status",field:"status",type:"sel",opts:STATUSES},
                    {label:"Interview Stage",field:"interviewStage",type:"sel",opts:INTERVIEW_STAGES},
                {label:"Source",field:"source",type:"sel",opts:SOURCES},
                {label:"Hiring Class",field:"hiringClass",type:"txt"},
                {label:"Screening Status",field:"screeningStatus",type:"sel",opts:SCREENING_STATUSES},
                {label:"Referred By",field:"referredBy",type:"txt"},
                {label:"Start Date",field:"startDate",type:"date"},
              ].map(({label,field,type,opts})=>(
                <div key={field}>
                  <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>{label}</label>
                  {type==="sel"?(
                    <select value={nC[field]} onChange={e=>setNC(p=>({...p,[field]:e.target.value}))} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13}}>
                      {opts.map(o=><option key={o}>{o}</option>)}
                    </select>
                  ):(
                    <input type={type==="date"?"date":"text"} value={nC[field]} onChange={e=>setNC(p=>({...p,[field]:e.target.value}))} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,boxSizing:"border-box"}}/>
                  )}
                </div>
              ))}
              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Notes</label>
                <textarea value={nC.notes} onChange={e=>setNC(p=>({...p,notes:e.target.value}))} rows={2} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
              </div>

            </div>
            <div style={{display:"flex",gap:7,marginTop:16,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowAdd(false)} style={{border:"1px solid #e5e7eb",background:"#fff",borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={addCand} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Add</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD DNH MODAL */}
      {showDNH&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowDNH(false)}>
          <div style={{background:"#fff",borderRadius:12,padding:20,width:420}} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 12px",fontSize:15,fontWeight:700}}>Add to Do Not Hire</h3>
            {[{l:"Full Name *",f:"name"},{l:"Department",f:"dept"},{l:"Reason *",f:"reason"}].map(({l,f})=>(
              <div key={f} style={{marginBottom:9}}>
                <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>{l}</label>
                <input value={nD[f]} onChange={e=>setND(p=>({...p,[f]:e.target.value}))} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13,boxSizing:"border-box"}}/>
              </div>
            ))}
            <div style={{marginBottom:9}}>
              <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Category</label>
              <select value={nD.category} onChange={e=>setND(p=>({...p,category:e.target.value}))} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 9px",fontSize:13}}>
                {["Behavioral","No Hire","Conflict of Interest","Other"].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:7,marginTop:16,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowDNH(false)} style={{border:"1px solid #e5e7eb",background:"#fff",borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={addDNH} style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Add</button>
            </div>
          </div>
        </div>
      )}

      {/* DETAIL MODAL */}
      {sel&&(()=>{
        const [newLog,setNewLog]=useState({action:"",who:"",note:"",date:new Date().toISOString().split("T")[0]});
        const [activeTab,setActiveTab]=useState("info");
        const LOG_ACTIONS=["Screening","1st Interview","2nd Interview","3rd Interview","Offer Sent","Onboarding","Follow Up","Other"];
        return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSel(null)}>
          <div style={{background:"#fff",borderRadius:12,padding:0,width:660,maxHeight:"92vh",overflowY:"auto",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div style={{padding:"16px 20px 0",borderBottom:"1px solid #f3f4f6"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <h3 style={{margin:0,fontSize:16,fontWeight:700}}>{sel.name}</h3>
                  <div style={{marginTop:5,display:"flex",gap:5,flexWrap:"wrap"}}>
                    <SBadge status={sel.status}/>
                    {sel.interviewStage&&<StageBadge stage={sel.interviewStage}/>}
                    {sel.screeningStatus&&<ScreenBadge screening={sel.screeningStatus}/>}
                    <span style={{fontSize:11,background:"#f3f4f6",color:"#374151",borderRadius:99,padding:"2px 7px"}}>{sel.dept}</span>
                    {sel.role&&<span style={{fontSize:11,background:"#f3f4f6",color:"#374151",borderRadius:99,padding:"2px 7px"}}>{sel.role}</span>}
                    {checkDNH(sel.name,dnh)&&<DNHBadge type={checkDNH(sel.name,dnh).type}/>}
                  </div>
                </div>
                <button onClick={()=>setSel(null)} style={{border:"none",background:"#f3f4f6",borderRadius:99,width:28,height:28,cursor:"pointer",fontSize:14,flexShrink:0}}>x</button>
              </div>
              {/* Tab nav */}
              <div style={{display:"flex",gap:0}}>
                {[["info","Profile"],["history","History"],["reviews","Reviews"]].map(([t,l])=>(
                  <button key={t} onClick={()=>setActiveTab(t)}
                    style={{padding:"7px 16px",fontSize:13,fontWeight:activeTab===t?600:400,border:"none",borderBottom:activeTab===t?"2px solid #3b82f6":"2px solid transparent",background:"transparent",cursor:"pointer",color:activeTab===t?"#3b82f6":"#6b7280"}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>

            <div style={{padding:"16px 20px",flex:1}}>

              {/* ── PROFILE TAB ── */}
              {activeTab==="info"&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[
                    {l:"Status",f:"status",type:"sel",opts:STATUSES},
                    {l:"Interview Stage",f:"interviewStage",type:"sel",opts:INTERVIEW_STAGES},
                    {l:"Screening Status",f:"screeningStatus",type:"sel",opts:SCREENING_STATUSES},
                    {l:"Department",f:"dept",type:"sel",opts:["Sales","Negotiations","Client Services"]},
                    {l:"Role",f:"role",type:"txt"},
                    {l:"Source",f:"source",type:"sel",opts:SOURCES},
                    {l:"Hiring Class",f:"hiringClass",type:"txt"},
                    {l:"Referred By",f:"referredBy",type:"txt"},
                    {l:"Start Date",f:"startDate",type:"date"},
                  ].map(({l,f,type,opts})=>(
                    <div key={f}>
                      <label style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.04em"}}>{l}</label>
                      {type==="sel"?(
                        <select value={sel[f]||""} onChange={e=>upd(sel.id,f,e.target.value)} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 8px",fontSize:13}}>
                          {opts.map(o=><option key={o}>{o}</option>)}
                        </select>
                      ):(
                        <input type={type==="date"?"date":"text"} value={sel[f]||""} onChange={e=>upd(sel.id,f,e.target.value)} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 8px",fontSize:13,boxSizing:"border-box"}}/>
                      )}
                    </div>
                  ))}
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.04em"}}>Notes</label>
                    <textarea value={sel.notes||""} onChange={e=>upd(sel.id,"notes",e.target.value)} rows={3} style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
                  </div>
                </div>
              )}

              {/* ── HISTORY TAB ── */}
              {activeTab==="history"&&(
                <div>
                  {/* Add new log entry */}
                  <div style={{background:"#f8fafc",border:"1px solid #e5e7eb",borderRadius:9,padding:14,marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>Add History Entry</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                      <div>
                        <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Action</label>
                        <select value={newLog.action} onChange={e=>setNewLog(p=>({...p,action:e.target.value}))}
                          style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13}}>
                          <option value="">Select action...</option>
                          {LOG_ACTIONS.map(a=><option key={a}>{a}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Date</label>
                        <input type="date" value={newLog.date} onChange={e=>setNewLog(p=>({...p,date:e.target.value}))}
                          style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13,boxSizing:"border-box"}}/>
                      </div>
                      <div>
                        <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Who</label>
                        <input placeholder="Your name" value={newLog.who} onChange={e=>setNewLog(p=>({...p,who:e.target.value}))}
                          style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13,boxSizing:"border-box"}}/>
                      </div>
                      <div>
                        <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Note</label>
                        <input placeholder="What happened..." value={newLog.note} onChange={e=>setNewLog(p=>({...p,note:e.target.value}))}
                          style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13,boxSizing:"border-box"}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",justifyContent:"flex-end"}}>
                      <button onClick={()=>{
                        if(!newLog.action) return;
                        const entry={...newLog,type:"log",timestamp:new Date().toISOString()};
                        const newHist=[...(sel.history||[]),entry];
                        upd(sel.id,"history",newHist);
                        setNewLog({action:"",who:"",note:"",date:new Date().toISOString().split("T")[0]});
                      }} disabled={!newLog.action}
                        style={{background:newLog.action?"#3b82f6":"#e5e7eb",color:newLog.action?"#fff":"#9ca3af",border:"none",borderRadius:6,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:newLog.action?"pointer":"default"}}>
                        + Add Entry
                      </button>
                    </div>
                  </div>

                  {/* History timeline */}
                  {sel.history&&sel.history.length>0?(
                    <div style={{position:"relative",paddingLeft:20}}>
                      <div style={{position:"absolute",left:6,top:6,bottom:6,width:2,background:"#e5e7eb",borderRadius:2}}/>
                      {[...sel.history].reverse().map((h,ri)=>{
                        const actualIdx=sel.history.length-1-ri;
                        const isLatest=ri===0;
                        const d=h.date?new Date(h.date):h.timestamp?new Date(h.timestamp):null;
                        const dateStr=d&&!isNaN(d)?d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
                        const s=STATUS_STYLE[h.status]||{bg:"#f0f9ff",text:"#0c4a6e",border:"#bae6fd"};
                        const isLog=h.type==="log";
                        return(
                          <div key={ri} style={{display:"flex",gap:10,marginBottom:10,position:"relative"}}>
                            <div style={{position:"absolute",left:-17,top:4,width:10,height:10,borderRadius:99,background:isLatest?(isLog?"#8b5cf6":s.border):"#e5e7eb",border:`2px solid ${isLatest?(isLog?"#8b5cf6":s.border):"#d1d5db"}`,zIndex:1}}/>
                            <div style={{flex:1,background:isLatest?"#fafafa":"#fff",border:`1px solid ${isLatest?"#e5e7eb":"#f3f4f6"}`,borderRadius:8,padding:"9px 12px"}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                                <div style={{display:"flex",alignItems:"center",gap:6}}>
                                  {isLog?(
                                    <span style={{background:"#ede9fe",color:"#5b21b6",borderRadius:99,fontSize:11,fontWeight:600,padding:"2px 8px"}}>{h.action}</span>
                                  ):(
                                    <SBadge status={h.status}/>
                                  )}
                                  {h.who&&<span style={{fontSize:11,color:"#6b7280"}}>by {h.who}</span>}
                                </div>
                                <span style={{fontSize:11,color:"#9ca3af"}}>{dateStr}</span>
                              </div>
                              {h.note&&<div style={{fontSize:12,color:"#374151",marginTop:3}}>{h.note}</div>}
                              {!isLog&&(
                                <div style={{display:"flex",gap:6,marginTop:6}}>
                                  <input type="date" value={h.date?new Date(h.date).toISOString().split("T")[0]:""}
                                    onChange={e=>{
                                      const nh=[...sel.history];
                                      nh[actualIdx]={...nh[actualIdx],date:e.target.value?new Date(e.target.value+"T12:00:00").toISOString():""};
                                      upd(sel.id,"history",nh);
                                    }}
                                    style={{fontSize:11,border:"1px solid #e5e7eb",borderRadius:5,padding:"2px 6px",outline:"none"}}/>
                                  <input placeholder="Add note..." value={h.note||""}
                                    onChange={e=>{
                                      const nh=[...sel.history];
                                      nh[actualIdx]={...nh[actualIdx],note:e.target.value};
                                      upd(sel.id,"history",nh);
                                    }}
                                    style={{flex:1,fontSize:11,border:"1px solid #e5e7eb",borderRadius:5,padding:"2px 6px",outline:"none"}}/>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ):(
                    <div style={{textAlign:"center",padding:"24px 0",color:"#9ca3af",fontSize:13}}>No history yet</div>
                  )}
                </div>
              )}

              {/* ── REVIEWS TAB ── */}
              {activeTab==="reviews"&&(()=>{
                const [newReview,setNewReview]=useState({stage:"",reviewer:"",rating:"",notes:""});
                const reviews=sel.reviews||[];
                return(
                  <div>
                    <div style={{background:"#f8fafc",border:"1px solid #e5e7eb",borderRadius:9,padding:14,marginBottom:16}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>Add Interview Review</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                        <div>
                          <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Interview Stage</label>
                          <select value={newReview.stage} onChange={e=>setNewReview(p=>({...p,stage:e.target.value}))}
                            style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13}}>
                            <option value="">Select stage...</option>
                            {["1st Interview","2nd Interview","3rd Interview","Final Round"].map(s=><option key={s}>{s}</option>)}
                          </select>
                        </div>
                        <div>
                          <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Reviewer Name</label>
                          <input placeholder="Your name" value={newReview.reviewer} onChange={e=>setNewReview(p=>({...p,reviewer:e.target.value}))}
                            style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13,boxSizing:"border-box"}}/>
                        </div>
                        <div>
                          <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Rating</label>
                          <select value={newReview.rating} onChange={e=>setNewReview(p=>({...p,rating:e.target.value}))}
                            style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13}}>
                            <option value="">Select rating...</option>
                            {["Strong Yes","Yes","Maybe","No","Strong No"].map(r=><option key={r}>{r}</option>)}
                          </select>
                        </div>
                        <div>
                          <label style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Notes</label>
                          <input placeholder="Interview feedback..." value={newReview.notes} onChange={e=>setNewReview(p=>({...p,notes:e.target.value}))}
                            style={{width:"100%",marginTop:3,border:"1px solid #e5e7eb",borderRadius:6,padding:"6px 8px",fontSize:13,boxSizing:"border-box"}}/>
                        </div>
                      </div>
                      <div style={{display:"flex",justifyContent:"flex-end"}}>
                        <button onClick={()=>{
                          if(!newReview.stage||!newReview.reviewer) return;
                          const r={...newReview,date:new Date().toISOString()};
                          upd(sel.id,"reviews",[...reviews,r]);
                          setNewReview({stage:"",reviewer:"",rating:"",notes:""});
                        }} disabled={!newReview.stage||!newReview.reviewer}
                          style={{background:(newReview.stage&&newReview.reviewer)?"#3b82f6":"#e5e7eb",color:(newReview.stage&&newReview.reviewer)?"#fff":"#9ca3af",border:"none",borderRadius:6,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:(newReview.stage&&newReview.reviewer)?"pointer":"default"}}>
                          + Add Review
                        </button>
                      </div>
                    </div>
                    {reviews.length>0?(
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {[...reviews].reverse().map((r,i)=>{
                          const rColors={"Strong Yes":"#dcfce7","Yes":"#d1fae5","Maybe":"#fef9c3","No":"#fee2e2","Strong No":"#fecaca"};
                          const rText={"Strong Yes":"#14532d","Yes":"#065f46","Maybe":"#713f12","No":"#991b1b","Strong No":"#7f1d1d"};
                          return(
                            <div key={i} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:8,padding:"12px 14px"}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <span style={{fontSize:12,fontWeight:700,color:"#374151"}}>{r.stage}</span>
                                  {r.rating&&<span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:99,background:rColors[r.rating]||"#f3f4f6",color:rText[r.rating]||"#374151"}}>{r.rating}</span>}
                                </div>
                                <div style={{textAlign:"right"}}>
                                  <div style={{fontSize:12,color:"#374151",fontWeight:600}}>{r.reviewer}</div>
                                  <div style={{fontSize:11,color:"#9ca3af"}}>{new Date(r.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                                </div>
                              </div>
                              {r.notes&&<div style={{fontSize:13,color:"#6b7280"}}>{r.notes}</div>}
                            </div>
                          );
                        })}
                      </div>
                    ):(
                      <div style={{textAlign:"center",padding:"24px 0",color:"#9ca3af",fontSize:13}}>No reviews yet</div>
                    )}
                  </div>
                );
              })()}

            </div>
          </div>
        </div>
        );
      })()}
      {/* BULK STATUS CHANGE PROMPT */}
      {bulkPrompt&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setBulkPrompt(null)}>
          <div style={{background:"#fff",borderRadius:12,padding:22,width:400,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 4px",fontSize:15,fontWeight:700}}>Bulk Status Change</h3>
            <p style={{margin:"0 0 16px",fontSize:13,color:"#6b7280"}}>
              Changing <strong>{selectedIds.size} candidate{selectedIds.size>1?"s":""}</strong> to <SBadge status={bulkPrompt.newStatus}/>
            </p>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Date this happened</label>
              <input
                type="date"
                value={bulkPrompt.date}
                onChange={e=>setBulkPrompt(p=>({...p,date:e.target.value}))}
                style={{width:"100%",marginTop:4,border:"1px solid #e5e7eb",borderRadius:6,padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none"}}
              />
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Note <span style={{fontWeight:400,color:"#9ca3af"}}>(optional - applied to all)</span></label>
              <input
                placeholder="e.g. April 27 hiring class…"
                value={bulkPrompt.note}
                onChange={e=>setBulkPrompt(p=>({...p,note:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&confirmBulkChange()}
                style={{width:"100%",marginTop:4,border:"1px solid #e5e7eb",borderRadius:6,padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none"}}
                autoFocus
              />
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setBulkPrompt(null)} style={{border:"1px solid #e5e7eb",background:"#fff",borderRadius:6,padding:"7px 14px",fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={confirmBulkChange} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Apply to {selectedIds.size}</button>
            </div>
          </div>
        </div>
      )}

      {/* STATUS CHANGE PROMPT */}
      {statusPrompt&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setStatusPrompt(null)}>
          <div style={{background:"#fff",borderRadius:12,padding:22,width:380,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
            <h3 style={{margin:"0 0 4px",fontSize:15,fontWeight:700}}>Confirm Status Change</h3>
            <p style={{margin:"0 0 16px",fontSize:13,color:"#6b7280"}}>
              <SBadge status={statusPrompt.oldStatus}/> <span style={{margin:"0 6px",color:"#9ca3af"}}>→</span> <SBadge status={statusPrompt.newStatus}/>
            </p>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Date this happened</label>
              <input
                type="date"
                value={statusPrompt.date}
                onChange={e=>setStatusPrompt(p=>({...p,date:e.target.value}))}
                style={{width:"100%",marginTop:4,border:"1px solid #e5e7eb",borderRadius:6,padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none"}}
              />
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,fontWeight:600,color:"#374151"}}>Note <span style={{fontWeight:400,color:"#9ca3af"}}>(optional)</span></label>
              <input
                placeholder="e.g. Strong first call, sent offer package…"
                value={statusPrompt.note}
                onChange={e=>setStatusPrompt(p=>({...p,note:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&confirmStatusChange()}
                style={{width:"100%",marginTop:4,border:"1px solid #e5e7eb",borderRadius:6,padding:"7px 10px",fontSize:13,boxSizing:"border-box",outline:"none"}}
                autoFocus
              />
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setStatusPrompt(null)} style={{border:"1px solid #e5e7eb",background:"#fff",borderRadius:6,padding:"7px 14px",fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={confirmStatusChange} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
